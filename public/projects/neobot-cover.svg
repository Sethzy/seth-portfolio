    <text x="550" y="393" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="850">MEETING PREP</text>
    <text x="550" y="430" fill="#064E3B" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="860">3 ready</text>

