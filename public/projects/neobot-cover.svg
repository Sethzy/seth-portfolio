    <text x="536" y="543" fill="#F8FAFC">Claude</text>
    <rect x="624" y="520" width="106" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="652" y="543" fill="#F8FAFC">Codex</text>
    <rect x="746" y="520" width="102" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-opacity="0.14"/>
