<svg width="1300" height="600" viewBox="0 0 1300 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NeoBot AI CRM cover</title>
  <desc id="desc">A polished AI CRM workspace showing daily relationship work, follow-ups, pipeline stages, approvals, and an assistant review panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1300" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101827"/>
      <stop offset="0.52" stop-color="#181A2E"/>
      <stop offset="1" stop-color="#2A1F43"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#B469FF"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ECFDF3"/>
      <stop offset="1" stop-color="#F7FFF9"/>
    </linearGradient>
    <linearGradient id="peach" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF3E8"/>
      <stop offset="1" stop-color="#FFFBF5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-18%" width="120%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#050711" flood-opacity="0.34"/>
    </filter>
    <pattern id="grain" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.75" fill="#FFFFFF" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1300" height="600" fill="url(#bg)"/>
  <rect width="1300" height="600" fill="url(#grain)"/>
  <path d="M960 0L1300 318V600H1194L866 0H960Z" fill="#FFFFFF" opacity="0.055"/>
  <circle cx="1126" cy="96" r="178" fill="#7C5CFF" opacity="0.14"/>

  <text x="72" y="88" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="870">NeoBot AI CRM</text>
  <text x="74" y="128" fill="#C9D0E5" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="590">A calm relationship workspace for meetings, deals, and approvals.</text>

