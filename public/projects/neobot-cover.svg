    <rect x="972" y="304" width="168" height="54" rx="17" fill="#111827"/>
    <circle cx="1004" cy="331" r="13" fill="url(#violet)"/>
    <text x="1030" y="326" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850">NeoBot</text>
    <text x="1030" y="346" fill="#C7D2FE" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="720">Assistant</text>
    <rect x="972" y="382" width="168" height="50" rx="15" fill="#F8FAFC" stroke="#E3E7EF"/>
    <text x="992" y="410" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="850">Prepare meeting</text>
