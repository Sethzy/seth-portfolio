    <text x="762" y="393" fill="#B45309" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="850">APPROVALS</text>
    <text x="762" y="430" fill="#7C2D12" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="860">2 open</text>

