    <rect x="520" y="466" width="174" height="26" rx="13" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="550" y="484" fill="#5B21B6" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="850">Marcus Loh</text>
